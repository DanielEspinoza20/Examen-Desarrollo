<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modificar Unidad - SAUAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #4a90c4 0%, #3ab8b8 50%, #2dcca0 100%);
            padding: 24px; position: relative;
        }
        .form-card {
            background: white; border-radius: 20px; padding: 32px 36px;
            width: 100%; max-width: 460px; box-shadow: 0 6px 28px rgba(0,0,0,0.13);
        }
        .form-card h2 {
            font-size: 20px; font-weight: 700; color: #1e4d8c;
            text-align: center; margin-bottom: 24px;
        }
        .search-section { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-section input {
            flex: 1; border: 1.5px solid #ccc; border-radius: 8px; padding: 9px 12px;
            font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
            transition: border-color 0.2s; color: #222;
        }
        .search-section input:focus { border-color: #3ab8b8; box-shadow: 0 0 0 3px rgba(58,184,184,0.15); }
        .btn-buscar {
            background: linear-gradient(135deg, #3ab8b8, #2aa0a0); color: white;
            border: none; border-radius: 8px; padding: 9px 20px;
            font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: background 0.2s;
        }
        .btn-buscar:hover { background: linear-gradient(135deg, #2aa0a0, #1a8888); }
        .hint { font-size: 12px; text-align: center; margin-bottom: 16px; font-style: italic; color: #888; }
        .hint.found    { color: #2e7d32; font-style: normal; font-weight: 600; }
        .hint.notfound { color: #c62828; font-style: normal; }
        .divider { border: none; border-top: 1.5px dashed #dde; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .form-group label { font-size: 14px; font-weight: 500; color: #333; }
        .form-group input {
            border: 1.5px solid #ccc; border-radius: 8px; padding: 9px 12px;
            font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
            transition: border-color 0.2s; color: #222; width: 100%;
        }
        .form-group input:focus { border-color: #3ab8b8; box-shadow: 0 0 0 3px rgba(58,184,184,0.15); }
        .horas-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 4px; }
        .hora-item { display: flex; flex-direction: column; gap: 5px; }
        .hora-item label { font-size: 12px; font-weight: 500; color: #333; }
        .hora-item input {
            border: 1.5px solid #ccc; border-radius: 8px; padding: 9px 8px;
            font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
            text-align: center; outline: none; transition: border-color 0.2s;
            color: #222; width: 100%;
        }
        .hora-item input:focus { border-color: #3ab8b8; box-shadow: 0 0 0 3px rgba(58,184,184,0.15); }
        .range-hint { text-align: center; font-size: 11px; color: #888; margin-bottom: 14px; font-style: italic; }
        .ui-message-error-detail { color: #e53935; font-size: 11px; }
        .btn-modificar {
            width: 100%; margin-top: 8px; padding: 12px;
            background: linear-gradient(135deg, #4caf6e, #3a9c5a); color: white;
            border: none; border-radius: 10px; font-family: 'Outfit', sans-serif;
            font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 3px 10px rgba(60,160,90,0.3); transition: background 0.2s;
        }
        .btn-modificar:hover { background: linear-gradient(135deg, #43a363, #2e8a4c); }
        .btn-regresar {
            position: fixed; bottom: 24px; left: 24px;
            background: linear-gradient(135deg, #4caf6e, #3a9c5a); color: white;
            border: none; border-radius: 8px; padding: 11px 28px;
            font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; box-shadow: 0 3px 10px rgba(60,160,90,0.3);
            transition: background 0.2s;
        }
        .btn-regresar:hover { background: linear-gradient(135deg, #43a363, #2e8a4c); }
    </style>
</h:head>

<h:body>

    <!-- Growl para mensajes -->
    <p:growl id="mensajes" showDetail="true" life="3500" />

    <div class="form-card">
        <h2>Modificar unidad</h2>

        <!-- Sección de búsqueda -->
        <h:form id="formBuscar">
            <div class="search-section">
                <h:inputText id="nombreBuscar"
                             value="#{unidadBean.nombreBusqueda}"
                             placeholder="Nombre de la unidad a buscar..." />
                <p:commandButton value="Buscar"
                                 action="#{unidadBean.buscar}"
                                 update="formBuscar mensajes formModificar hintPanel"
                                 styleClass="btn-buscar" />
            </div>

            <!-- Mensaje de estado de búsqueda -->
            <p:outputPanel id="hintPanel">
                <p class="hint #{unidadBean.unidadEncontrada ? 'found' : (unidadBean.busquedaRealizada ? 'notfound' : '')}">
                    #{unidadBean.mensajeBusqueda}
                </p>
            </p:outputPanel>

            <hr class="divider" />
        </h:form>

        <!-- Formulario de modificación -->
        <h:form id="formModificar">
            <h:panelGroup rendered="#{unidadBean.unidadEncontrada}">

                <div class="form-group">
                    <label>Nombre:</label>
                    <h:inputText id="nombre"
                                 value="#{unidadBean.unidad.nombreUnidad}"
                                 maxlength="50"
                                 required="true"
                                 requiredMessage="El nombre es obligatorio" />
                    <h:message for="nombre" styleClass="ui-message-error-detail" />
                </div>

                <div class="horas-group">
                    <div class="hora-item">
                        <label>Horas Clase</label>
                        <h:inputText id="hClase"
                                     value="#{unidadBean.unidad.horasClase}"
                                     required="true"
                                     requiredMessage="Obligatorio">
                            <f:validateLongRange minimum="0" maximum="4" />
                        </h:inputText>
                        <h:message for="hClase" styleClass="ui-message-error-detail" />
                    </div>
                    <div class="hora-item">
                        <label>Horas Taller</label>
                        <h:inputText id="hTaller"
                                     value="#{unidadBean.unidad.horasTaller}"
                                     required="true"
                                     requiredMessage="Obligatorio">
                            <f:validateLongRange minimum="0" maximum="4" />
                        </h:inputText>
                        <h:message for="hTaller" styleClass="ui-message-error-detail" />
                    </div>
                    <div class="hora-item">
                        <label>Horas Lab</label>
                        <h:inputText id="hLab"
                                     value="#{unidadBean.unidad.horasLaboratorio}"
                                     required="true"
                                     requiredMessage="Obligatorio">
                            <f:validateLongRange minimum="0" maximum="4" />
                        </h:inputText>
                        <h:message for="hLab" styleClass="ui-message-error-detail" />
                    </div>
                </div>

                <p class="range-hint">Cada campo acepta valores entre 0 y 4</p>

                <p:commandButton value="Modificar"
                                 action="#{unidadBean.actualizar}"
                                 update="formModificar mensajes formBuscar hintPanel"
                                 styleClass="btn-modificar" />
            </h:panelGroup>
        </h:form>
    </div>

    <!-- Botón regresar -->
    <h:form id="formRegresar">
        <p:commandButton value="Regresar"
                         action="adminUnidad?faces-redirect=true"
                         styleClass="btn-regresar"
                         immediate="true" />
    </h:form>

</h:body>
</html>

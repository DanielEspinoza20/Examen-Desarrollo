<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<f:metadata>
    <f:viewAction action="#{loginBean.verificarAdmin}" />
</f:metadata>
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrador - SAUAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box; margin: 0; padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a90c4 0%, #3ab8b8 50%, #2dcca0 100%);
        }

        .screen {
            width: 100%;
            max-width: 960px;
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        .title-card {
            background: white;
            border-radius: 16px;
            padding: 18px 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            text-align: center;
        }
        .title-card h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e4d8c;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .title-card p {
            color: #555;
            font-size: 14px;
        }

        .top-row {
            display: flex;
            gap: 24px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mid-row, .bottom-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .bottom-row { justify-content: flex-end; }

        .menu-card {
            background: white;
            border-radius: 16px;
            padding: 24px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            min-width: 220px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .menu-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.15);
        }
        .menu-card span {
            font-size: 18px;
            font-weight: 600;
            color: #1e4d8c;
        }

        .btn-ir, .btn-salir {
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-ir {
            background: linear-gradient(135deg, #4caf6e, #3a9c5a);
            color: white;
            padding: 10px 48px;
            box-shadow: 0 3px 8px rgba(60,160,90,0.3);
        }
        .btn-ir:hover {
            background: linear-gradient(135deg, #43a363, #2e8a4c);
            box-shadow: 0 5px 14px rgba(60,160,90,0.4);
        }

        .btn-salir {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            padding: 10px 40px;
            font-weight: 700;
        }
        .btn-salir:hover {
            background: #b71c1c;
        }

        .btn-ir:active, .btn-salir:active {
            transform: scale(0.97);
        }
    </style>
</h:head>

<h:body>
    <div class="screen">
        <div class="title-card">
            <h1>ADMINISTRADOR</h1>
            <p>Bienvenido, <b>#{loginBean.usuario.username}</b></p>
        </div>

        <h:form id="adminForm">
            <div class="top-row">
                <div class="menu-card">
                    <span>Profesor</span>
                    <h:commandButton value="Ir" action="adminProfesor?faces-redirect=true" styleClass="btn-ir" />
                </div>
                <div class="menu-card">
                    <span>Unidad</span>
                    <h:commandButton value="Ir" action="adminUnidad?faces-redirect=true" styleClass="btn-ir" />
                </div>
                <div class="menu-card">
                    <span>Asignar</span>
                    <h:commandButton value="Ir" action="adminAsignar?faces-redirect=true" styleClass="btn-ir" />
                </div>
            </div>

            <br/>

            <div class="mid-row">
                <div class="menu-card">
                    <span>Consulta General</span>
                    <h:commandButton value="Ir" action="consultas" styleClass="btn-ir" />
                </div>
            </div>

            <br/>

            <div class="bottom-row">
                <div class="menu-card">
                    <span>Salir al Login</span>
                    <h:commandButton value="Salir" action="#{loginBean.logout}" styleClass="btn-salir" />
                </div>
            </div>
        </h:form>
    </div>
</h:body>
</html>

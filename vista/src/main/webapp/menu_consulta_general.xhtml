<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta General - SAUAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4a90c4 0%, #3ab8b8 50%, #2dcca0 100%);
            display: flex; flex-direction: column; align-items: center;
            padding: 28px 24px 80px 24px;
            position: relative;
        }

        .title-bar {
            background: white; border-radius: 12px; padding: 16px 60px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.11);
            margin-bottom: 40px; width: 100%; max-width: 540px;
            text-align: center;
        }

        .title-bar h1 { font-size: 20px; font-weight: 700; color: #1e4d8c; }

        .menu-card {
            background: white; border-radius: 16px; padding: 24px 32px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.11);
            width: 100%; max-width: 440px;
            text-align: center; margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.15); }

        .menu-card h2 { font-size: 17px; font-weight: 700; color: #1e4d8c; margin-bottom: 16px; }

        .btn-ir {
            background: linear-gradient(135deg, #4caf6e, #3a9c5a); color: white;
            border: none; border-radius: 8px; padding: 10px 48px;
            font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; box-shadow: 0 3px 10px rgba(60,160,90,0.28);
            transition: background 0.2s, transform 0.1s;
        }

        .btn-ir:hover { background: linear-gradient(135deg, #43a363, #2e8a4c); }
        .btn-ir:active { transform: scale(0.97); }

        .btn-salir {
            position: fixed; bottom: 24px; left: 24px;
            background: linear-gradient(135deg, #4caf6e, #3a9c5a); color: white;
            border: none; border-radius: 8px; padding: 11px 28px;
            font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; box-shadow: 0 3px 10px rgba(60,160,90,0.3);
            transition: background 0.2s, transform 0.1s;
        }

        .btn-salir:hover { background: linear-gradient(135deg, #43a363, #2e8a4c); }
        .btn-salir:active { transform: scale(0.97); }
    </style>
</h:head>

<h:body>

    <div class="title-bar">
        <h1>Consulta general</h1>
    </div>

    <h:form id="menuForm">

        <!-- Consulta Profesor -->
        <div class="menu-card">
            <h2>Consulta Profesor</h2>
            <p:commandButton value="Ir"
                             action="consulta_profesor?faces-redirect=true"
                             styleClass="btn-ir" />
        </div>

        <!-- Consulta Unidad -->
        <div class="menu-card">
            <h2>Consulta Unidad</h2>
            <p:commandButton value="Ir"
                             action="consultaUnidad?faces-redirect=true"
                             styleClass="btn-ir" />
        </div>

    </h:form>

    <!-- Botón Salir -->
    <h:form id="footerForm">
        <p:commandButton value="Salir"
                         action="admin?faces-redirect=true"
                         styleClass="btn-salir"
                         immediate="true" />
    </h:form>

</h:body>
</html>

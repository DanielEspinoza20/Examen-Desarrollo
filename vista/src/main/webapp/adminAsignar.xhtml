<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      lang="es">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrador - Asignación - SAUAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a90c4 0%, #3ab8b8 50%, #2dcca0 100%);
            padding: 32px 24px;
            gap: 28px;
        }

        .title-card {
            background: white;
            border-radius: 14px;
            padding: 16px 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .title-card h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1e4d8c;
            letter-spacing: 0.3px;
        }

        .menu-col {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 420px;
        }

        .menu-card {
            background: white;
            border-radius: 16px;
            padding: 20px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .menu-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.15);
        }
        .menu-card span {
            font-size: 17px;
            font-weight: 600;
            color: #1e4d8c;
            text-align: center;
            line-height: 1.3;
        }

        .btn-ir {
            background: linear-gradient(135deg, #4caf6e, #3a9c5a);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 60px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(60,160,90,0.3);
            transition: background 0.2s, transform 0.1s;
        }
        .btn-ir:hover  { background: linear-gradient(135deg, #43a363, #2e8a4c); }
        .btn-ir:active { transform: scale(0.97); }

        .footer {
            width: 100%;
            max-width: 860px;
            display: flex;
            justify-content: flex-end;
        }
        .salir-card {
            background: white;
            border-radius: 16px;
            padding: 18px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }
        .salir-card span {
            font-size: 16px;
            font-weight: 600;
            color: #1e4d8c;
        }
        .btn-salir {
            background: linear-gradient(135deg, #4caf6e, #3a9c5a);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 44px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(60,160,90,0.3);
            transition: background 0.2s, transform 0.1s;
        }
        .btn-salir:hover  { background: linear-gradient(135deg, #43a363, #2e8a4c); }
        .btn-salir:active { transform: scale(0.97); }
    </style>
</h:head>
<h:body>

    <div class="title-card">
        <h1>ADMINISTRADOR - Asignación</h1>
    </div>

    <h:form id="formMenu">
        <div class="menu-col">

            <div class="menu-card">
                <span>Asignación Unidades</span>
                <h:commandButton value="Ir"
                                 action="registrarAsignacion?faces-redirect=true"
                                 styleClass="btn-ir" />
            </div>

            <div class="menu-card">
                <span>Modificar&#160;Asignación Unidades</span>
                <h:commandButton value="Ir"
                                 action="modificarAsignacion?faces-redirect=true"
                                 styleClass="btn-ir" />
            </div>

            <div class="menu-card">
                <span>Eliminar Asignación&#160;Unidades</span>
                <h:commandButton value="Ir"
                                 action="eliminarAsignacion?faces-redirect=true"
                                 styleClass="btn-ir" />
            </div>

        </div>
    </h:form>

    <div class="footer">
        <div class="salir-card">
            <span>Salir al Menú</span>
            <h:form>
                <h:commandButton value="Salir"
                                 action="admin?faces-redirect=true"
                                 styleClass="btn-salir"
                immediate="true"/>
            </h:form>
        </div>
    </div>

</h:body>
</html>

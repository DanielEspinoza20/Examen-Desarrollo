<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenido Profesor - SAUAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        {
            box-sizing: border-box; margin: 0; padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a90c4 0%, #3ab8b8 50%, #2dcca0 100%);
            padding: 32px 24px;
            gap: 24px;
        }

        .title-card {
            background: white;
            border-radius: 14px;
            padding: 16px 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            text-align: center;
        }
        .title-card h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1e4d8c;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .title-card p {
            color: #555;
            margin-top: 5px;
            font-size: 15px;
        }

        .table-wrapper {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 900px;
            max-height: 480px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead tr {
            background: #2e6db4;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        thead th {
            padding: 12px 14px;
            font-weight: 600;
            text-align: left;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        tbody tr:nth-child(odd)  {
            background: #dde6f0;
        }
        tbody tr:nth-child(even) {
            background: #edf2f8;
        }

        tbody td {
            padding: 10px 14px;
            color: #333;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.6);
            height: 45px;
        }

        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }
        .tag-clase  {
            background: #c8e6c9; color: #2e7d32;
        }
        .tag-taller {
            background: #fff9c4; color: #f57f17;
        }
        .tag-lab    {
            background: #fce4ec; color: #c62828;
        }

        .table-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .table-wrapper::-webkit-scrollbar-track {
            background: #edf2f8;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #2e6db4; border-radius: 4px;
        }

        .footer {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-start;
        }

        .btn-salir {
            background: linear-gradient(135deg, #4caf6e, #3a9c5a);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 11px 44px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(60,160,90,0.3);
            transition: background 0.2s, transform 0.1s;
        }
        .btn-salir:hover {
            background: linear-gradient(135deg, #43a363, #2e8a4c);
        }
        .btn-salir:active { transform: scale(0.97); }
    </style>
</h:head>

<h:body>
    <!-- Verificar sesión de profesor -->
    <f:event type="preRenderView" listener="#{loginBean.verificarProfesor}"/>

    <div class="title-card">
        <h1>BIENVENIDO – PROFESOR</h1>
        <p>Hola, <b>#{profesorSesionBean.nombreCompleto}</b>. Este es tu horario actual.</p>
    </div>

    <!-- Mensaje si no tiene asignaciones -->
    <h:panelGroup rendered="#{!profesorSesionBean.tieneAsignaciones}">
        <div style="background:white; border-radius:14px; padding:2rem 3rem;
                    box-shadow:0 4px 20px rgba(0,0,0,0.12); text-align:center; color:#888;">
            <p style="font-size:1.1rem;">📭 No tienes unidades de aprendizaje asignadas por el momento.</p>
        </div>
    </h:panelGroup>

    <!-- Tabla de horario dinámica -->
    <h:panelGroup rendered="#{profesorSesionBean.tieneAsignaciones}">
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Horas</th>
                    <th>Lunes</th>
                    <th>Martes</th>
                    <th>Miércoles</th>
                    <th>Jueves</th>
                    <th>Viernes</th>
                    <th>Sábado</th>
                </tr>
                </thead>
                <tbody>
                <!-- Una fila por cada hora del día 7am-10pm -->
                <ui:repeat var="hora" value="#{profesorSesionBean.horasDelDia}">
                    <tr>
                        <td>#{hora}</td>
                        <!-- Una celda por cada día -->
                        <ui:repeat var="dia" value="#{profesorSesionBean.diasSemana}">
                            <td>
                                <!-- Buscar asignación que coincida con este día y hora -->
                                <ui:repeat var="a" value="#{profesorSesionBean.asignaciones}">
                                    <h:panelGroup rendered="#{profesorSesionBean.coincide(a, dia, hora)}">
                                        <span class="tag tag-clase">#{a.idUnidad.nombreUnidad}</span>
                                    </h:panelGroup>
                                </ui:repeat>
                            </td>
                        </ui:repeat>
                    </tr>
                </ui:repeat>
                </tbody>
            </table>
        </div>
    </h:panelGroup>

    <div class="footer">
        <h:form>
            <h:commandButton value="Salir"
                             action="#{loginBean.logout}"
                             styleClass="btn-salir" />
        </h:form>
    </div>
</h:body>
</html>
